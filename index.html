<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 50px; }
        .calc { border: 1px solid #ccc; padding: 20px; border-radius: 10px; width: 300px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        .btns { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 5px; }
        button { padding: 10px; cursor: pointer; font-size: 18px; }
        .res-box { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="calc">
        <h3>Калькулятор</h3>
        <!-- Поля ввода для чисел -->
        <input type="number" id="num1" placeholder="Первое число">
        <input type="number" id="num2" placeholder="Второе число">

        <div class="btns">
            <!-- Обработчики событий сразу на кнопках -->
            <button onclick="calculate('+')">+</button>
            <button onclick="calculate('-')">-</button>
            <button onclick="calculate('*')">*</button>
            <button onclick="calculate('/')">/</button>
        </div>

        <!-- Поле для вывода результата -->
        <div class="res-box">Результат: <span id="result">0</span></div>
    </div>

    <!-- Подключение логики -->
    <script src="app.js"></script>
</body>
</html>
